<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menu</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    background:#2b2b2b;
    font-family:Arial, Helvetica, sans-serif;
}

.menu{
    display:flex;
    align-items:flex-end;
    gap:28px;
    margin-bottom:40px;
}

.button{
    width:240px;
    height:90px;

    border-radius:14px;

    background:linear-gradient(
        to bottom,
        rgba(65,65,65,0.95),
        rgba(25,25,25,0.95)
    );

    border:1px solid rgba(255,255,255,0.08);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    color:white;

    transition:transform 0.15s ease;
}

.button:hover{
    transform:scale(1.1);
}

.title{
    font-size:24px;
    font-weight:700;
}

.desc{
    font-size:13px;
    opacity:0.7;
    margin-top:4px;
}

/* distance scaling like the screenshot */
.button:nth-child(1){
    transform:scale(0.82);
}

.button:nth-child(2){
    transform:scale(0.92);
}

.button:nth-child(3){
    transform:scale(1);
}

.button:nth-child(4){
    transform:scale(0.92);
}

</style>

</head>
<body>

<div class="menu">

<div class="button">
<div class="title">Badges</div>
<div class="desc">Achievements</div>
</div>

<div class="button">
<div class="title">Credits</div>
<div class="desc">People who helped</div>
</div>

<div class="button">
<div class="title">Skins</div>
<div class="desc">Customize characters</div>
</div>

<div class="button">
<div class="title">Gamemodes</div>
<div class="desc">Different ways to play</div>
</div>

</div>

</body>
</html>
